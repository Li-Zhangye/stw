<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>验证邮箱 - 短信转网页</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon.png">
  <script src="/js/i18n.js" defer></script>
  <script src="/js/theme.js" defer></script>
</head>
<body>
  <div class="container" style="position:relative;">
    <div class="project-logo"><img src="/icon.png" alt=""></div>
    <select id="langSwitcher" style="position:absolute;top:12px;right:12px;font-size:11px;padding:2px 4px;border-radius:4px;border:1px solid var(--theme-border,#e0e0e0);background:var(--theme-bg-card,#fff);color:var(--theme-text,#333);cursor:pointer;" onchange="switchLang(this.value)"></select>
    <h1>验证邮箱</h1>
    <p class="subtitle">请填写手机号和收到的验证码</p>

    <div id="message" class="message"></div>

    <div class="verify-info" id="verifyInfo"></div>

    <form id="verifyForm" autocomplete="off">
      <div class="form-group">
        <label for="phone">手机号</label>
        <input type="tel" id="phone" name="phone" placeholder="请输入11位手机号" maxlength="11" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="code">验证码</label>
        <input type="text" id="code" name="code" placeholder="请输入6位数字验证码" maxlength="6" inputmode="numeric" pattern="\d{6}" autocomplete="off">
      </div>

      <button type="submit" class="btn" id="submitBtn" data-original-text="下一步">下一步</button>
    </form>

    <div class="links">
      <a href="/register.html">重新注册</a>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    function switchLang(code) {
      i18n.setLang(code);
      i18n.applyLangToPage();
      var sel = document.getElementById('langSwitcher');
      if (sel) sel.value = code;
    }
    function initLangSwitcher() {
      var sel = document.getElementById('langSwitcher');
      if (!sel) return;
      var langs = i18n.getLanguages();
      var current = i18n.getLang();
      sel.innerHTML = '';
      langs.forEach(function(l) {
        var opt = document.createElement('option');
        opt.value = l.code;
        opt.textContent = l.name;
        if (l.code === current) opt.selected = true;
        sel.appendChild(opt);
      });
    }
    var savedLang = i18n.getLang();
    if (savedLang && savedLang !== 'zh') {
      i18n.setLang(savedLang);
    }
    i18n.applyLangToPage();
    initLangSwitcher();

    let messageEl = document.getElementById('message');
    let verifyInfo = document.getElementById('verifyInfo');
    let form = document.getElementById('verifyForm');
    let submitBtn = document.getElementById('submitBtn');
    let phoneInput = document.getElementById('phone');
    let codeInput = document.getElementById('code');

    let urlParams = new URLSearchParams(window.location.search);
    let key = urlParams.get('key') || sessionStorage.getItem('verify_key');

    if (key) {
      sessionStorage.setItem('verify_key', key);
      history.replaceState(null, '', window.location.pathname);
      verifyInfo.innerHTML = '验证链接已识别，请填写手机号和验证码';
    } else {
      verifyInfo.innerHTML = '未检测到验证链接，请从邮箱中的链接进入';
      showMessage(messageEl, 'error', '缺少验证参数，请从邮箱中的链接进入');
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      hideMessage(messageEl);

      if (!key) {
        showMessage(messageEl, 'error', '验证链接无效，请从邮箱中的链接进入');
        return;
      }

      let phone = phoneInput.value.trim();
      let code = codeInput.value.trim();

      if (!phone) {
        showMessage(messageEl, 'error', '请输入手机号');
        phoneInput.focus();
        return;
      }

      if (!/^1[3-9]\d{9}$/.test(phone)) {
        showMessage(messageEl, 'error', '手机号格式不正确');
        phoneInput.focus();
        return;
      }

      if (!code) {
        showMessage(messageEl, 'error', '请输入验证码');
        codeInput.focus();
        return;
      }

      if (!/^\d{6}$/.test(code)) {
        showMessage(messageEl, 'error', '验证码为6位数字');
        codeInput.focus();
        return;
      }

      setLoading(submitBtn, true);

      apiPost('/api/auth/register/verify-code', {
        key: key,
        phone: phone,
        code: code
      }, function (result) {
        setLoading(submitBtn, false);
        showMessage(messageEl, 'success', '验证码正确');
        setTimeout(function () {
          window.location.href = '/set-password.html?phone=' + encodeURIComponent(phone) + '&token=' + encodeURIComponent(result.tempToken);
        }, 800);
      }, function (result) {
        setLoading(submitBtn, false);
        showMessage(messageEl, 'error', result.message || '验证失败');
      });
    });

    phoneInput.addEventListener('input', function () {
      this.value = this.value.replace(/\D/g, '');
    });

    codeInput.addEventListener('input', function () {
      this.value = this.value.replace(/\D/g, '');
    });
  </script>
</body>
</html>
