<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置密码 - 短信转网页</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon.png">
  <script src="/js/i18n.js" defer></script>
  <script src="/js/theme.js" defer></script>
</head>
<body>
  <div class="container" style="position:relative;">
    <div class="project-logo"><img src="/icon.png" alt=""></div>
    <select id="langSwitcher" style="position:absolute;top:12px;right:12px;font-size:11px;padding:2px 4px;border-radius:4px;border:1px solid var(--theme-border,#e0e0e0);background:var(--theme-bg-card,#fff);color:var(--theme-text,#333);cursor:pointer;" onchange="switchLang(this.value)"></select>
    <h1>设置密码</h1>
    <p class="subtitle">请设置您的登录密码</p>

    <div id="message" class="message"></div>

    <form id="passwordForm" autocomplete="off">
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="new-password">
        <div class="password-rules">密码必须包含数字、大小写字母、特殊符号，长度8-32位</div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">确认密码</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入密码" autocomplete="new-password">
      </div>

      <button type="submit" class="btn" id="submitBtn" data-original-text="完成注册">完成注册</button>
    </form>

    <div class="links">
      <a href="/register.html">重新注册</a>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    function switchLang(code) {
      i18n.setLang(code);
      i18n.applyLangToPage();
      var sel = document.getElementById('langSwitcher');
      if (sel) sel.value = code;
    }
    function initLangSwitcher() {
      var sel = document.getElementById('langSwitcher');
      if (!sel) return;
      var langs = i18n.getLanguages();
      var current = i18n.getLang();
      sel.innerHTML = '';
      langs.forEach(function(l) {
        var opt = document.createElement('option');
        opt.value = l.code;
        opt.textContent = l.name;
        if (l.code === current) opt.selected = true;
        sel.appendChild(opt);
      });
    }
    var savedLang = i18n.getLang();
    if (savedLang && savedLang !== 'zh') {
      i18n.setLang(savedLang);
    }
    i18n.applyLangToPage();
    initLangSwitcher();

    let messageEl = document.getElementById('message');
    let form = document.getElementById('passwordForm');
    let submitBtn = document.getElementById('submitBtn');
    let passwordInput = document.getElementById('password');
    let confirmInput = document.getElementById('confirmPassword');

    let urlParams = new URLSearchParams(window.location.search);
    let phone = urlParams.get('phone');
    let tempToken = urlParams.get('token');

    if (phone && tempToken) {
      history.replaceState(null, '', window.location.pathname);
    }

    if (!phone || !tempToken) {
      showMessage(messageEl, 'error', '参数不完整，请重新注册');
    }

    function checkPasswordStrength(pwd) {
      let hasDigit = /[0-9]/.test(pwd);
      let hasLower = /[a-z]/.test(pwd);
      let hasUpper = /[A-Z]/.test(pwd);
      let hasSpecial = /[!@#$%^&*()_+\-=\[\]{}|;':",.<>?\/~`]/.test(pwd);
      let lengthOk = pwd.length >= 8 && pwd.length <= 32;
      return lengthOk && hasDigit && hasLower && hasUpper && hasSpecial;
    }

    passwordInput.addEventListener('input', function () {
      if (this.value.length === 0) {
        this.className = '';
        return;
      }
      if (checkPasswordStrength(this.value)) {
        this.className = 'success';
      } else {
        this.className = 'error';
      }
    });

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      hideMessage(messageEl);

      if (!phone || !tempToken) {
        showMessage(messageEl, 'error', '参数不完整，请重新注册');
        return;
      }

      let password = passwordInput.value;
      let confirm = confirmInput.value;

      if (!password) {
        showMessage(messageEl, 'error', '请输入密码');
        passwordInput.focus();
        return;
      }

      if (!checkPasswordStrength(password)) {
        showMessage(messageEl, 'error', '密码必须包含数字、大小写字母、特殊符号，长度8-32位');
        passwordInput.focus();
        return;
      }

      if (password !== confirm) {
        showMessage(messageEl, 'error', '两次输入的密码不一致');
        confirmInput.focus();
        return;
      }

      setLoading(submitBtn, true);

      apiPost('/api/auth/register/set-password', {
        phone: phone,
        password: password,
        tempToken: tempToken
      }, function (result) {
        setLoading(submitBtn, false);
        showMessage(messageEl, 'success', '注册成功');
        setTimeout(function () {
          window.location.href = '/login.html';
        }, 1200);
      }, function (result) {
        setLoading(submitBtn, false);
        showMessage(messageEl, 'error', result.message || '注册失败');
      });
    });
  </script>
</body>
</html>
