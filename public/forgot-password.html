<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>忘记密码 - 短信转网页</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/icon.png">
  <script src="/js/i18n.js" defer></script>
  <script src="/js/theme.js" defer></script>
</head>
<body>
  <div class="container" style="position:relative;">
    <div class="project-logo"><img src="/icon.png" alt=""></div>
    <select id="langSwitcher" style="position:absolute;top:12px;right:12px;font-size:11px;padding:2px 4px;border-radius:4px;border:1px solid var(--theme-border,#e0e0e0);background:var(--theme-bg-card,#fff);color:var(--theme-text,#333);cursor:pointer;" onchange="switchLang(this.value)"></select>
    <h1>忘记密码</h1>
    <p class="subtitle">通过邮箱验证码重置密码</p>

    <div id="message" class="message"></div>

    <form id="resetForm" autocomplete="off">
      <div class="form-group">
        <label for="phone">手机号</label>
        <input type="tel" id="phone" name="phone" placeholder="请输入11位手机号" maxlength="11" autocomplete="username">
      </div>

      <div class="form-group">
        <label for="emailCode">邮箱验证码</label>
        <div style="display:flex;gap:8px;">
          <input type="text" id="emailCode" name="emailCode" placeholder="请输入6位验证码" maxlength="6" inputmode="numeric" pattern="\d{6}" style="flex:1;" autocomplete="off">
          <button type="button" class="btn btn-secondary" id="sendCodeBtn" style="white-space:nowrap;">发送验证码</button>
        </div>
      </div>

      <hr style="border:none;border-top:1px solid #eee;margin:20px 0;">

      <p style="font-size:13px;color:#888;margin-bottom:15px;">验证通过后，请设置新密码</p>

      <div class="form-group">
        <label for="newPassword">新密码</label>
        <input type="password" id="newPassword" name="newPassword" placeholder="请输入新密码" autocomplete="new-password">
        <div class="password-rules">密码必须包含数字、大小写字母、特殊符号，长度8-32位</div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">确认密码</label>
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请再次输入新密码" autocomplete="new-password">
      </div>

      <button type="submit" class="btn" id="resetBtn" data-original-text="重置密码">重置密码</button>
    </form>

    <div class="links">
      <a href="/login.html">返回登录</a>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    function switchLang(code) {
      i18n.setLang(code);
      i18n.applyLangToPage();
      var sel = document.getElementById('langSwitcher');
      if (sel) sel.value = code;
    }
    function initLangSwitcher() {
      var sel = document.getElementById('langSwitcher');
      if (!sel) return;
      var langs = i18n.getLanguages();
      var current = i18n.getLang();
      sel.innerHTML = '';
      langs.forEach(function(l) {
        var opt = document.createElement('option');
        opt.value = l.code;
        opt.textContent = l.name;
        if (l.code === current) opt.selected = true;
        sel.appendChild(opt);
      });
    }
    var savedLang = i18n.getLang();
    if (savedLang && savedLang !== 'zh') {
      i18n.setLang(savedLang);
    }
    i18n.applyLangToPage();
    initLangSwitcher();

    let messageEl = document.getElementById('message');
    let form = document.getElementById('resetForm');
    let resetBtn = document.getElementById('resetBtn');
    let phoneInput = document.getElementById('phone');
    let emailCodeInput = document.getElementById('emailCode');
    let newPasswordInput = document.getElementById('newPassword');
    let confirmInput = document.getElementById('confirmPassword');
    let sendCodeBtn = document.getElementById('sendCodeBtn');

    let urlParams = new URLSearchParams(window.location.search);
    let urlPhone = urlParams.get('phone');
    if (urlPhone) {
      phoneInput.value = urlPhone;
      history.replaceState(null, '', window.location.pathname);
    }

    let codeSent = false;
    let codeCooldown = 0;

    function checkPasswordStrength(pwd) {
      let hasDigit = /[0-9]/.test(pwd);
      let hasLower = /[a-z]/.test(pwd);
      let hasUpper = /[A-Z]/.test(pwd);
      let hasSpecial = /[!@#$%^&*()_+\-=\[\]{}|;':",.<>?\/~`]/.test(pwd);
      let lengthOk = pwd.length >= 8 && pwd.length <= 32;
      return lengthOk && hasDigit && hasLower && hasUpper && hasSpecial;
    }

    newPasswordInput.addEventListener('input', function () {
      if (this.value.length === 0) {
        this.className = '';
        return;
      }
      if (checkPasswordStrength(this.value)) {
        this.className = 'success';
      } else {
        this.className = 'error';
      }
    });

    function sendCode() {
      let phone = phoneInput.value.trim();
      if (!phone) {
        showMessage(messageEl, 'error', '请输入手机号');
        phoneInput.focus();
        return;
      }

      hideMessage(messageEl);
      sendCodeBtn.disabled = true;
      sendCodeBtn.textContent = '发送中...';

      apiPost('/api/auth/forgot-password/send-code', {
        phone: phone
      }, function (result) {
        showMessage(messageEl, 'info', '验证码已发送到您的邮箱');
        codeSent = true;
        codeCooldown = 60;
        updateCodeBtn();
      }, function (result) {
        sendCodeBtn.disabled = false;
        sendCodeBtn.textContent = '发送验证码';
        showMessage(messageEl, 'error', result.message || '发送失败');
      });
    }

    function updateCodeBtn() {
      if (codeCooldown > 0) {
        sendCodeBtn.disabled = true;
        sendCodeBtn.textContent = '重新发送(' + codeCooldown + 's)';
        codeCooldown--;
        setTimeout(updateCodeBtn, 1000);
      } else {
        sendCodeBtn.disabled = false;
        sendCodeBtn.textContent = '重新发送';
      }
    }

    sendCodeBtn.addEventListener('click', sendCode);

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      hideMessage(messageEl);

      let phone = phoneInput.value.trim();
      let emailCode = emailCodeInput.value.trim();
      let newPwd = newPasswordInput.value;
      let confirm = confirmInput.value;

      if (!phone) {
        showMessage(messageEl, 'error', '请输入手机号');
        phoneInput.focus();
        return;
      }

      if (!emailCode) {
        showMessage(messageEl, 'error', '请输入验证码');
        emailCodeInput.focus();
        return;
      }

      if (!newPwd) {
        showMessage(messageEl, 'error', '请输入新密码');
        newPasswordInput.focus();
        return;
      }

      if (!checkPasswordStrength(newPwd)) {
        showMessage(messageEl, 'error', '密码必须包含数字、大小写字母、特殊符号，长度8-32位');
        newPasswordInput.focus();
        return;
      }

      if (newPwd !== confirm) {
        showMessage(messageEl, 'error', '两次输入的密码不一致');
        confirmInput.focus();
        return;
      }

      setLoading(resetBtn, true);

      apiPost('/api/auth/forgot-password/reset', {
        phone: phone,
        emailCode: emailCode,
        newPassword: newPwd
      }, function (result) {
        setLoading(resetBtn, false);
        showMessage(messageEl, 'success', '密码重置成功，即将跳转登录');
        setTimeout(function () {
          window.location.href = '/login.html';
        }, 1500);
      }, function (result) {
        setLoading(resetBtn, false);
        showMessage(messageEl, 'error', result.message || '重置失败');
      });
    });
  </script>
</body>
</html>
